input_unit: mm
moveit_position_scale: 0.001
moveit_frame_id: base_link

moveit_x_sign: 1.0
moveit_y_sign: 1.0
moveit_z_sign: 1.0

moveit_x_offset_m: 0.0
moveit_y_offset_m: 0.0
moveit_z_offset_m: 0.0

pre_grasp_z_offset_mm: 140.0
grasp_offset_x_mm: 0.0
grasp_offset_y_mm: 0.0
grasp_offset_z_mm: 45.0
lift_up_mm: 80.0
enable_grasp_coordinate_compensation: true
grasp_bias_x_mm: 5.0
grasp_bias_y_mm: 0.0
grasp_bias_z_mm: -95.0
apply_xy_bias_to_pre_grasp: true
apply_z_bias_to_pre_grasp: false
enable_fixed_grasp_rpy: true
fixed_grasp_roll_rad: 0.0
fixed_grasp_pitch_rad: 1.3963
fixed_grasp_yaw_rad: 0.0
pre_grasp_settle_s: 0.5
grasp_settle_s: 1.0
lift_settle_s: 0.5

workspace_x_min_mm: 120.0
workspace_x_max_mm: 500.0
workspace_y_min_mm: -300.0
workspace_y_max_mm: 300.0
workspace_z_min_mm: -80.0
workspace_z_max_mm: 500.0

stable_target_min_frames: 3
stable_target_max_position_std_mm: 30.0
stage_target_max_age_s: 3.0
allow_snapshot_expire_during_motion: true
move_line_timeout_s: 120.0
move_joint_timeout_s: 120.0
service_wait_timeout_s: 5.0
use_move_joint_for_pre_grasp: true
use_move_joint_for_grasp: true
use_move_joint_for_lift: true

move_to_observe_joint_pose_on_start: false
observe_b_deg: 0.0
observe_s_deg: 0.0
observe_e_deg: 70.0
observe_t_deg: 90.0
observe_r_deg: -90.0
observe_joint_speed_deg_s: 35.0
observe_joint_acc: 35.0
observe_wait_s: 3.0

joint_command_mode: official_joint_topic
official_joint_topic: /joint_states
official_joint_names:
  - base_link_to_link1
  - link1_to_link2
  - link2_to_link3
  - link3_to_link4
  - link4_to_link5
  - link5_to_gripper_link
official_joint_units: rad
observe_gripper_rad: 0.0
observe_joint_publish_duration_s: 1.0
observe_joint_publish_rate_hz: 10.0

gripper_open_value: 1.5
gripper_close_value: 0.7
gripper_close_value_strong: 0.5

auto_start: true
dry_run: false
enable_gripper: true
enable_base_adjust_request: true

base_adjust_topic: /red_block/base_adjust_request
